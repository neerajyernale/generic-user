<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Managemant Task</title>
     <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
        crossorigin="anonymous"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="bg-user-management text-white p-3 d-flex justify-content-between align-items-center">
  
  <div class="d-flex align-items-center">
    <i class="fa-solid fa-users me-2"></i>
    <h1 class="m-0 ml-2">User Management</h1>
  </div>
  
  <div class="d-flex align-items-center">
    <i class="fa-solid fa-user fa-lg me-2 "></i>
    <h2 class="m-0 fs-5 ml-2">Admin User</h2>
    <i class="fa-solid fa-chevron-down ml-1"></i>

  </div>
</header>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3">
            <div class="card shadow mt-3">
                <div class="card-header bg-color text-white d-flex align-items-center">
                     <i class="fa-solid fa-user-plus me-2"></i>
                     <h3 class="ml-2">User Form</h3>

                </div>
                <div class="card-body">
                    <form id="userForm">
                        <div class="form-group">
                            <label for="name">Enter The Name*</label>
                            <input type="text" class="form-control" id="name" required   placeholder="Enter Name">
                        </div>
                        <div class="form-group">
                            <label for="username">Enter The Username*</label>
                            <input type="text" class="form-control" id="username" required placeholder="Enter username">
                        </div>
                        <div class="form-group">
                            <label for="email">Enter The Email*</label>
                            <input type="text" class="form-control" id="email" required placeholder="Enter email">
                        </div>
                        <div class="form-group">
                            <label for="contact">Enter The contact*</label>
                            <input type="text" class="form-control" id="contact" required placeholder="Enter contact">
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-block bg-color text-white" id="addBtn"  >
                                <i class="fa-solid fa-user-plus"></i>
                                Add User
                            </button>
                            <button type="button" class="btn btn-block  bg-user-management1 d-none" id="updateBtn">
                                <i class="fa-solid fa-pen"></i>
                                Update User
                            </button>

                        </div>

                    </form>

                </div>
            </div>
        </div>
        <div class="col-md-8 m-0">
            <div class="card mt-3">
                <div class="card-header d-flex align-items-center">
                    <i class="fa-solid fa-users color"></i>
                    <h3 class="ml-2">User List</h3>

                </div>
                <div class="card-body">
                    <table class="table table-bordered-0">
                        <thead class="color1">
                          <th>Sr.No</th>
                          <th>Name</th>
                          <th>Username</th>
                          <th>Email</th>
                          <th>Contact</th>
                          <th>Action</th>
                            
                        </thead>
                        <tbody id="userContainer"></tbody>
                    </table>

                </div>
            </div>
        </div>
    </div>
</div>
      <div class="spinner d-none" id="spinner">
           <div class="spinner-border text-danger" role="status"></div>
      </div>
<script src="assets/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
